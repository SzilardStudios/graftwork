    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8a020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1208" height="830" fill="url(#grid)" opacity="0.5"/>
  <ellipse cx="604" cy="360" rx="320" ry="300" fill="url(#glow)"/>

  <g transform="translate(604, 360)">

    <polygon points="0,-190 164.5,-95 164.5,95 0,190 -164.5,95 -164.5,-95"
