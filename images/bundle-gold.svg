    <circle cx="0" cy="0" r="12" fill="#f0c050"/>
    <circle cx="0" cy="0" r="6" fill="#0f1c2e"/>

    <polygon points="0,-26 5,-18 14,-18 7,-12 10,-3 0,-9 -10,-3 -7,-12 -14,-18 -5,-18" fill="#f0c050"/>

    <line x1="-90" y1="78" x2="90" y2="78" stroke="#f0c050" stroke-width="1" opacity="0.6"/>
    <line x1="-90" y1="85" x2="90" y2="85" stroke="#f0c050" stroke-width="0.5" opacity="0.4"/>

