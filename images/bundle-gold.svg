    <g transform="rotate(-35) translate(-18, -18)">
      <rect x="0" y="6" width="80" height="24" rx="4" fill="#f0c050"/>
      <rect x="2" y="9" width="76" height="18" rx="3" fill="#0f1c2e" stroke="#f0c050" stroke-width="1.5"/>
      <rect x="24" y="6" width="32" height="10" rx="3" fill="#f0c050"/>
      <rect x="28" y="2" width="24" height="12" rx="3" fill="#f0c050"/>
      <circle cx="8" cy="18" r="6" fill="#f0c050"/>
      <circle cx="8" cy="18" r="3" fill="#0f1c2e"/>
      <rect x="-8" y="15" width="16" height="6" rx="2" fill="#f0c050"/>
    </g>

    <g transform="rotate(145) translate(-18, -18)">
      <rect x="0" y="6" width="80" height="24" rx="4" fill="#f0c050"/>
      <rect x="2" y="9" width="76" height="18" rx="3" fill="#0f1c2e" stroke="#f0c050" stroke-width="1.5"/>
      <rect x="24" y="6" width="32" height="10" rx="3" fill="#f0c050"/>
      <rect x="28" y="2" width="24" height="12" rx="3" fill="#f0c050"/>
      <circle cx="8" cy="18" r="6" fill="#f0c050"/>
      <circle cx="8" cy="18" r="3" fill="#0f1c2e"/>
      <rect x="-8" y="15" width="16" height="6" rx="2" fill="#f0c050"/>
    </g>

    <circle cx="0" cy="0" r="32" fill="#f0c050"/>
