<svg width="1208" height="830" viewBox="0 0 1208 830" xmlns="http://www.w3.org/2000/svg">
  <title>Complete Graftwork Pack – Gold</title>

  <rect width="1208" height="830" fill="#0f1c2e"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
